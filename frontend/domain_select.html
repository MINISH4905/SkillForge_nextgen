<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge | Select Your Path</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-glass: rgba(255, 255, 255, 0.05);
            --accent-dsa: #00f2fe;
            --accent-frontend: #ff0080;
            --accent-backend: #7928ca;
            --accent-sql: #f59e0b;
            --accent-debugging: #10b981;
            --primary-glow: rgba(56, 189, 248, 0.3);
        }

        body {
            background: radial-gradient(circle at center, #1a202c 0%, #0a0e14 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: 'Outfit', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        .selection-container {
            width: 90%;
            max-width: 1200px;
            text-align: center;
            padding: 40px 20px;
            z-index: 10;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.25rem;
            margin-bottom: 4rem;
            font-weight: 400;
        }

        .domain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            perspective: 1000px;
        }

        .domain-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 3rem 1.5rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .domain-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .domain-card:hover::after {
            opacity: 1;
        }

        .domain-card.active {
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-12px) rotateX(5deg);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .domain-card i {
            font-size: 4rem;
            filter: drop-shadow(0 0 15px currentColor);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .domain-card:hover i {
            transform: scale(1.15) rotate(5deg);
        }

        /* Domain Accent Logic */
        .card-dsa:hover, .card-dsa.active { border-color: var(--accent-dsa); box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); }
        .card-dsa i { color: var(--accent-dsa); }

        .card-frontend:hover, .card-frontend.active { border-color: var(--accent-frontend); box-shadow: 0 0 30px rgba(255, 0, 128, 0.2); }
        .card-frontend i { color: var(--accent-frontend); }

        .card-backend:hover, .card-backend.active { border-color: var(--accent-backend); box-shadow: 0 0 30px rgba(121, 40, 202, 0.2); }
        .card-backend i { color: var(--accent-backend); }

        .card-sql:hover, .card-sql.active { border-color: var(--accent-sql); box-shadow: 0 0 30px rgba(245, 158, 11, 0.2); }
        .card-sql i { color: var(--accent-sql); }

        .card-debugging:hover, .card-debugging.active { border-color: var(--accent-debugging); box-shadow: 0 0 30px rgba(16, 185, 129, 0.2); }
        .card-debugging i { color: var(--accent-debugging); }

        .domain-name {
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .continue-btn {
            margin-top: 5rem;
            padding: 1.25rem 5rem;
            font-size: 1.3rem;
            font-weight: 800;
            border-radius: 100px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.3;
            pointer-events: none;
            transform: scale(0.95);
        }

        .continue-btn.ready {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .continue-btn:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.4);
        }

        /* Ambient Background Background */
        .ambient-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        .ambient-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(129, 140, 248, 0.2) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .domain-grid {
                grid-template-columns: 1fr 1fr;
            }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>
    <div class="ambient-glow-2"></div>

    <div class="selection-container">
        <h1>Forge Your Legacy</h1>
        <p class="subtitle">Commit to a domain to unlock the seasonal challenges</p>
        
        <div class="domain-grid">
            <div class="domain-card card-dsa" data-domain="dsa">
                <i class="fas fa-brain"></i>
                <span class="domain-name">DSA</span>
            </div>
            <div class="domain-card card-frontend" data-domain="frontend">
                <i class="fas fa-code"></i>
                <span class="domain-name">Frontend</span>
            </div>
            <div class="domain-card card-backend" data-domain="backend">
                <i class="fas fa-microchip"></i>
                <span class="domain-name">Backend</span>
            </div>
            <div class="domain-card card-sql" data-domain="sql">
                <i class="fas fa-database"></i>
                <span class="domain-name">SQL</span>
            </div>
            <div class="domain-card card-debugging" data-domain="debugging">
                <i class="fas fa-bug"></i>
                <span class="domain-name">Debugging</span>
            </div>
        </div>

        <button id="continueBtn" class="continue-btn">
            Enter the Arena <i class="fas fa-chevron-right" style="margin-left: 10px;"></i>
        </button>
    </div>

    <script>
        const cards = document.querySelectorAll('.domain-card');
        const btn = document.getElementById('continueBtn');
        let selectedDomain = null;

        // Interactive mouse tracking for glass effect
        cards.forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--x', `${x}%`);
                card.style.setProperty('--y', `${y}%`);
            });

            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedDomain = card.dataset.domain;
                btn.classList.add('ready');
                
                // Haptic-like feedback animation
                card.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(0.95)' },
                    { transform: 'scale(1.05)' },
                    { transform: 'scale(1)' }
                ], { duration: 300, easing: 'ease-out' });
            });
        });

        btn.addEventListener('click', async () => {
            if (!selectedDomain) return;

            const token = localStorage.getItem('skillforge_token');
            if (!token) {
                // If by some reason token is lost, go back to index to auth
                window.location.href = '/';
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/select-domain/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ domain: selectedDomain })
                });

                if (response.ok) {
                    localStorage.setItem('skillforge_domain', selectedDomain);
                    window.location.href = '/'; // Go back to main game
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to select domain');
                }
            } catch (err) {
                console.error(err);
                alert('Connection error. Please try again.');
            }
        });
    </script>
</body>
</html>
