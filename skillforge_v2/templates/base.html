{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge V2 — Infinite Mastery</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'dashboard:home' %}" style="text-decoration: none;">
            <h1>SkillForge ⚔️</h1>
        </a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard:home' %}">Domains</a>
                <a href="{% url 'rewards:leaderboard' %}">Leaderboard</a>
                <a href="{% url 'dashboard:progress' %}">My Progress</a>
                <span style="color: var(--text-muted);">|</span>
                <span>Welcome, {{ user.username }}</span>
                <form action="{% url 'accounts:logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn" style="padding: 0.3rem 0.7rem; font-size: 0.9rem;">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'accounts:login' %}">Login</a>
                <a href="{% url 'accounts:signup' %}" class="btn">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <!-- Custom Scripts -->
    <script src="{% static 'js/app.js' %}"></script>

</body>
</html>
