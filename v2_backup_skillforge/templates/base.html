{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkillForge{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <a href="{% url 'dashboard' %}" style="text-decoration: none; color: var(--text-main); font-weight: 700; font-size: 1.25rem;">
                🔥 SkillForge
            </a>
        </div>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}">Dashboard</a>
                <a href="{% url 'tasks:task_list' %}">Forge Console</a>
                <a href="{% url 'leaderboard' %}">Leaderboard</a>
                <a href="{% url 'dashboard' %}" class="profile-icon" title="View Dashboard">
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=6366f1&color=fff" alt="avatar">
                    <span style="color: var(--text-main); font-weight: 500;">{{ user.username }}</span>
                </a>
                <a href="{% url 'logout' %}" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; margin-left: 1.5rem;">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer style="text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.875rem;">
        &copy; 2026 SkillForge. Built by Antigravity.
    </footer>
</body>
</html>
