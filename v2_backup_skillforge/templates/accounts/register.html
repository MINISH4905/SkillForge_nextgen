{% extends 'base.html' %}
{% block title %}Sign Up | SkillForge{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 4rem auto;">
    <h2 style="margin-top: 0; text-align: center;">Join the Forge ⚔️</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Create your profile and start climbing the ranks.</p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 0.875rem; color: var(--text-muted);">Pick a Username</label>
            {{ form.username }}
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 0.875rem; color: var(--text-muted);">Email Address</label>
            {{ form.email }}
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.875rem; color: var(--text-muted);">Set a Password</label>
            {{ form.password }}
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Forging Profile 🔨
        </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
        <span style="color: var(--text-muted);">Already a member?</span>
        <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login Here</a>
    </div>
</div>
{% endblock %}
