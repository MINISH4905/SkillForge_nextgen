{% extends 'base.html' %}
{% block title %}Login | SkillForge{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 4rem auto;">
    <h2 style="margin-top: 0; text-align: center;">Welcome Back 👤</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Login to resume your forge quest.</p>

    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label style="font-size: 0.875rem; color: var(--text-muted);">Username</label>
            {{ form.username }}
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="font-size: 0.875rem; color: var(--text-muted);">Password</label>
            {{ form.password }}
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            Authorize Forge 🛡️
        </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
        <span style="color: var(--text-muted);">New to the Forge?</span>
        <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign Up Here</a>
    </div>
</div>
{% endblock %}
