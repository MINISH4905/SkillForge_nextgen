{% extends 'base.html' %}
{% block title %}Edit Profile | SkillForge{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-top: 0; text-align: center;">🛡️ Edit Forge Profile</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Update your domain and bio to showcase your skills.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
            <button type="submit" class="btn btn-primary">Update Profile 🔥</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
